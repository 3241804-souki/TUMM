<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Piano Music Maker</title>

<link rel="icon" href="mainlogo.jpg">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:15px;
    color:#222;
}

.container{
    max-width:1600px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:20px;
}

.logo{
    width:80px;
    height:80px;
    border-radius:12px;
    object-fit:cover;
    margin-bottom:10px;
}

.banner{
    width:100%;
    max-height:180px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:15px;
}

h1{
    margin-bottom:10px;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
}

button,select{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.play-btn{background:#4caf50;color:white;}
.stop-btn{background:#f44336;color:white;}
.clear-btn{background:#2196f3;color:white;}
.save-btn{background:#9c27b0;color:white;}
.load-btn{background:#ff9800;color:white;}

.control-box{
    background:white;
    padding:10px;
    border-radius:8px;
}

#piano{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:2px;
    margin-bottom:25px;
}

.key{
    width:58px;
    height:170px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:10px;
    border:1px solid #333;
    cursor:pointer;
    user-select:none;
    font-size:12px;
    font-weight:bold;
}

.white{
    background:white;
    color:black;
}

.black{
    background:black;
    color:white;
}

.key.active{
    transform:translateY(4px);
}

#sequencerWrapper{
    overflow:auto;
    background:white;
    border-radius:12px;
    padding:10px;
}

#sequencer{
    display:grid;
    gap:1px;
}

.noteLabel{
    width:90px;
    height:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#ececec;
    font-size:12px;
    font-weight:bold;
    position:sticky;
    left:0;
    z-index:5;
}

.cell{
    width:28px;
    height:32px;
    background:white;
    border:1px solid #ddd;
    cursor:pointer;
}

.cell.active{
    background:#ffeb3b;
}

.cell.length{
    background:#ffc107;
}

.measure{
    border-right:3px solid #777 !important;
}

.playhead{
    outline:3px solid #ff5722;
}

.footer{
    text-align:center;
    margin-top:15px;
}

input[type=range]{
    width:120px;
}

input[type=number]{
    width:80px;
    padding:6px;
}
</style>
</head>
<body>

<div class="container">

<header>
<img src="mainlogo.jpg" class="logo">
<img src="sublogo.jpg" class="banner">

<h1>Advanced Piano Music Maker</h1>
<p>3 Octaves • Sharps • BPM • Instruments • Save/Load • Long Notes</p>
</header>

<div class="controls">

<button id="playBtn" class="play-btn">▶ Play</button>
<button id="stopBtn" class="stop-btn">■ Stop</button>
<button id="clearBtn" class="clear-btn">Clear</button>
<button id="saveBtn" class="save-btn">Save</button>
<button id="loadBtn" class="load-btn">Load</button>

<div class="control-box">
Volume
<input type="range" id="volume" min="0" max="100" value="50">
</div>

<div class="control-box">
BPM
<input type="number" id="bpm" value="120" min="40" max="300">
</div>

<div class="control-box">
Instrument
<select id="instrument">
<option value="piano">Piano</option>
<option value="electric">Electric Piano</option>
<option value="organ">Organ</option>
<option value="strings">Strings</option>
</select>
</div>

</div>

<div id="piano"></div>

<div id="sequencerWrapper">
<div id="sequencer"></div>
</div>

<div class="footer">
Click a cell = note start<br>
Click the same note again = make note longer
</div>

</div>

<script>
const pianoDiv = document.getElementById("piano");
const sequencer = document.getElementById("sequencer");

const STEPS = 64;

let audioContext;
let playing = null;
let currentStep = 0;

const notes = [
"C3","C#3","D3","D#3","E3","F3","F#3","G3","G#3","A3","A#3","B3",
"C4","C#4","D4","D#4","E4","F4","F#4","G4","G#4","A4","A#4","B4",
"C5","C#5","D5","D#5","E5","F5","F#5","G5","G#5","A5","A#5","B5"
];

const frequencies = {};

function generateFrequencyMap(){

const names=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

for(let octave=0;octave<=8;octave++){

for(let i=0;i<12;i++){

let note=names[i]+octave;

let a4Index=(4*12)+9;
let current=(octave*12)+i;

let freq=440*Math.pow(2,(current-a4Index)/12);

frequencies[note]=freq;
}
}
}

generateFrequencyMap();

const sequence=[];

notes.forEach(()=>{
sequence.push(
Array(STEPS).fill(null)
);
});

function createPiano(){

notes.forEach(note=>{

const key=document.createElement("div");

const isBlack=note.includes("#");

key.className="key "+(isBlack?"black":"white");

key.textContent=note;

key.onclick=()=>{
playSound(note,0.5);

key.classList.add("active");

setTimeout(()=>{
key.classList.remove("active");
},100);
};

pianoDiv.appendChild(key);

});

}

createPiano();

function buildSequencer(){

sequencer.style.gridTemplateColumns=
"90px repeat("+STEPS+", 28px)";

notes.forEach((note,row)=>{

const label=document.createElement("div");
label.className="noteLabel";
label.textContent=note;
sequencer.appendChild(label);

for(let col=0;col<STEPS;col++){

const cell=document.createElement("div");

cell.className="cell";

if((col+1)%4===0){
cell.classList.add("measure");
}

cell.dataset.row=row;
cell.dataset.col=col;

cell.onclick=()=>{

if(sequence[row][col]===null){

sequence[row][col]=1;

cell.classList.add("active");

}else{

sequence[row][col]++;

cell.classList.add("length");

if(sequence[row][col]>8){
sequence[row][col]=null;
cell.className="cell";

if((col+1)%4===0){
cell.classList.add("measure");
}
}

}

};

sequencer.appendChild(cell);

}

});

}

buildSequencer();

function getVolume(){
return document.getElementById("volume").value/100;
}

function initAudio(){

if(!audioContext){
audioContext=new(window.AudioContext||window.webkitAudioContext)();
}

}

function createOsc(type,freq,gainNode){

const osc=audioContext.createOscillator();

osc.type=type;
osc.frequency.value=freq;

osc.connect(gainNode);

osc.start();

return osc;
}

function playSound(note,length){

initAudio();

const instrument=document.getElementById("instrument").value;

const gain=audioContext.createGain();

gain.gain.value=getVolume();

gain.connect(audioContext.destination);

let oscillators=[];

if(instrument==="piano"){

oscillators.push(createOsc("sine",frequencies[note],gain));

}

if(instrument==="electric"){

oscillators.push(createOsc("triangle",frequencies[note],gain));

}

if(instrument==="organ"){

oscillators.push(createOsc("square",frequencies[note],gain));
oscillators.push(createOsc("square",frequencies[note]*2,gain));

}

if(instrument==="strings"){

oscillators.push(createOsc("sawtooth",frequencies[note],gain));
oscillators.push(createOsc("triangle",frequencies[note]*0.5,gain));

}

gain.gain.exponentialRampToValueAtTime(
0.0001,
audioContext.currentTime+length
);

oscillators.forEach(o=>{
o.stop(audioContext.currentTime+length);
});

}

function clearPlayhead(){

document.querySelectorAll(".playhead").forEach(c=>{
c.classList.remove("playhead");
});

}

function stopSong(){

clearInterval(playing);
playing=null;
currentStep=0;
clearPlayhead();

}

function playSong(){

stopSong();

const bpm=parseInt(
document.getElementById("bpm").value
);

const stepTime=(60000/bpm)/4;

playing=setInterval(()=>{

clearPlayhead();

const cells=document.querySelectorAll(".cell");

notes.forEach((note,row)=>{

const visualIndex=
(row*STEPS)+currentStep;

const cell=cells[visualIndex];

if(cell){
cell.classList.add("playhead");
}

const length=sequence[row][currentStep];

if(length){

playSound(
note,
(length*stepTime)/1000
);

}

});

currentStep++;

if(currentStep>=STEPS){
currentStep=0;
}

},stepTime);

}

document.getElementById("playBtn").onclick=playSong;
document.getElementById("stopBtn").onclick=stopSong;

document.getElementById("clearBtn").onclick=()=>{

stopSong();

for(let r=0;r<notes.length;r++){
for(let c=0;c<STEPS;c++){
sequence[r][c]=null;
}
}

document.querySelectorAll(".cell").forEach(cell=>{

cell.className="cell";

const col=parseInt(cell.dataset.col);

if((col+1)%4===0){
cell.classList.add("measure");
}

});

};

document.getElementById("saveBtn").onclick=()=>{

const data={
sequence:sequence
};

localStorage.setItem(
"advancedPianoSong",
JSON.stringify(data)
);

alert("Song Saved");

};

document.getElementById("loadBtn").onclick=()=>{

const data=
localStorage.getItem(
"advancedPianoSong"
);

if(!data){
alert("No saved song");
return;
}

const parsed=JSON.parse(data);

for(let r=0;r<notes.length;r++){
for(let c=0;c<STEPS;c++){

sequence[r][c]=parsed.sequence[r][c];

}
}

document.querySelectorAll(".cell").forEach(cell=>{

const row=parseInt(cell.dataset.row);
const col=parseInt(cell.dataset.col);

cell.className="cell";

if((col+1)%4===0){
cell.classList.add("measure");
}

const value=sequence[row][col];

if(value){

if(value===1){
cell.classList.add("active");
}else{
cell.classList.add("length");
}

}

});

alert("Song Loaded");

};
</script>

</body>
</html>
