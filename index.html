<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Piano Music Maker</title>

<link rel="icon" type="image/jpeg" href="mainlogo.jpg">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    color:#222;
    padding:15px;
}

.container{
    max-width:1200px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:20px;
}

.logo{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:10px;
}

.banner{
    width:100%;
    max-height:180px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:15px;
}

h1{
    margin-bottom:8px;
}

p{
    margin-bottom:10px;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    align-items:center;
    margin-bottom:20px;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.play-btn{
    background:#4caf50;
    color:white;
}

.stop-btn{
    background:#f44336;
    color:white;
}

.clear-btn{
    background:#2196f3;
    color:white;
}

.volume-box{
    background:white;
    padding:10px 14px;
    border-radius:8px;
}

#piano{
    display:flex;
    justify-content:center;
    gap:2px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.key{
    width:70px;
    height:180px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:10px;
    cursor:pointer;
    user-select:none;
    font-weight:bold;
    border:1px solid #444;
    transition:0.1s;
}

.white{
    background:white;
    color:black;
}

.black{
    background:black;
    color:white;
}

.key.active{
    transform:translateY(4px);
}

.white.active{
    background:#ddd;
}

.black.active{
    background:#444;
}

.sequencer-wrapper{
    overflow-x:auto;
    background:white;
    padding:10px;
    border-radius:12px;
}

#sequencer{
    display:grid;
    grid-template-columns:80px repeat(16, 50px);
    gap:2px;
}

.note-label{
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    background:#eee;
}

.step{
    width:50px;
    height:40px;
    cursor:pointer;
    border:1px solid #ccc;
}

.step.off{
    background:white;
}

.step.on{
    background:#ffeb3b;
}

.playing{
    outline:4px solid #ff9800;
}

.footer-text{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

<header>
    <img src="mainlogo.jpg" alt="Logo" class="logo">
    <img src="sublogo.jpg" alt="Banner" class="banner">

    <h1>Simple Piano Music Maker</h1>
    <p>Click piano keys to play sounds. Click yellow boxes to make music.</p>
</header>

<div class="controls">
    <button class="play-btn" id="playBtn">▶ Play Song</button>
    <button class="stop-btn" id="stopBtn">■ Stop</button>
    <button class="clear-btn" id="clearBtn">🗑 Clear</button>

    <div class="volume-box">
        Volume:
        <input type="range" id="volume" min="0" max="100" value="50">
        <span id="volumeText">50%</span>
    </div>
</div>

<div id="piano"></div>

<div class="sequencer-wrapper">
    <div id="sequencer"></div>
</div>

<div class="footer-text">
    Piano on top • Music sequencer on bottom
</div>

</div>

<script>
const notes = [
    {name:"C", freq:261.63, color:"white"},
    {name:"D", freq:293.66, color:"white"},
    {name:"E", freq:329.63, color:"white"},
    {name:"F", freq:349.23, color:"white"},
    {name:"G", freq:392.00, color:"white"},
    {name:"A", freq:440.00, color:"white"},
    {name:"B", freq:493.88, color:"white"},
    {name:"C5", freq:523.25, color:"black"}
];

const steps = 16;

const piano = document.getElementById("piano");
const sequencer = document.getElementById("sequencer");
const volumeSlider = document.getElementById("volume");
const volumeText = document.getElementById("volumeText");

let audioContext;
let interval = null;
let currentStep = 0;

const grid = [];

function getVolume(){
    return volumeSlider.value / 100;
}

volumeSlider.addEventListener("input", ()=>{
    volumeText.textContent = volumeSlider.value + "%";
});

function initAudio(){
    if(!audioContext){
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playTone(freq, duration=0.3){

    initAudio();

    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.value = getVolume();

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioContext.currentTime + duration
    );

    osc.stop(audioContext.currentTime + duration);
}

notes.forEach((note)=>{

    const key = document.createElement("div");
    key.className = "key " + note.color;
    key.textContent = note.name;

    key.addEventListener("click", ()=>{
        playTone(note.freq);

        key.classList.add("active");

        setTimeout(()=>{
            key.classList.remove("active");
        },100);
    });

    piano.appendChild(key);
});

notes.forEach((note,row)=>{

    const label = document.createElement("div");
    label.className = "note-label";
    label.textContent = note.name;

    sequencer.appendChild(label);

    grid[row] = [];

    for(let col=0; col<steps; col++){

        const cell = document.createElement("div");
        cell.className = "step off";

        grid[row][col] = false;

        cell.addEventListener("click", ()=>{

            grid[row][col] = !grid[row][col];

            if(grid[row][col]){
                cell.className = "step on";
                playTone(note.freq);
            }else{
                cell.className = "step off";
            }
        });

        sequencer.appendChild(cell);
    }
});

function stopSong(){

    clearInterval(interval);
    interval = null;

    document.querySelectorAll(".playing").forEach(el=>{
        el.classList.remove("playing");
    });

    currentStep = 0;
}

function playSong(){

    stopSong();

    const cells = document.querySelectorAll(".step");

    interval = setInterval(()=>{

        document.querySelectorAll(".playing").forEach(el=>{
            el.classList.remove("playing");
        });

        notes.forEach((note,row)=>{

            const cellIndex = row * steps + currentStep;
            const cell = cells[cellIndex];

            if(cell){
                cell.classList.add("playing");
            }

            if(grid[row][currentStep]){
                playTone(note.freq,0.25);
            }
        });

        currentStep++;

        if(currentStep >= steps){
            currentStep = 0;
        }

    },250);
}

document.getElementById("playBtn").addEventListener("click", playSong);
document.getElementById("stopBtn").addEventListener("click", stopSong);

document.getElementById("clearBtn").addEventListener("click", ()=>{

    stopSong();

    const cells = document.querySelectorAll(".step");

    let index = 0;

    for(let row=0; row<notes.length; row++){
        for(let col=0; col<steps; col++){

            grid[row][col] = false;

            cells[index].className = "step off";
            index++;
        }
    }
});
</script>

</body>
</html>
